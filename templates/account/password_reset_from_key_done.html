{% extends "base.html" %}
{% load i18n %}
{% load allauth %}
{% block head_title %}
    {% trans "Change Password" %}
{% endblock head_title %}
{% block content %}
    <div class="d-flex justify-content-center align-items-center">
        <div class="card rounded-3 p-4 mt-5 form-card shadow text-center">
            <h1 class="mb-4 h2">{% trans "Change Password" %}</h1>
            <p class="medium mb-4">{% trans "Your password is now changed." %}</p>
            <p>
                <a href="{% url 'home' %}" class="btn btn-outline-custom">{% trans "Back to Home" %}</a>
            </p>
        </div>
    </div>
{% endblock content %}
